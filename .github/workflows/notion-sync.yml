# Notion のデータベースを取得し、context/notion-tasks.generated.md を更新してコミットする
name: Notion sync

on:
  workflow_dispatch: # 手動実行（GitHub の Actions タブから）
  schedule:
    # 毎日 04:00 日本時間（JST）≒ 前日 19:00 UTC。GitHub の cron は UTC 基準。
    - cron: "0 19 * * *"

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Check Actions secrets exist
        run: |
          if [ -z "${{ secrets.NOTION_TOKEN }}" ]; then
            echo "::error::Secrets に NOTION_TOKEN がありません（空です）。Settings → Secrets and variables → Actions で追加してください。"
            exit 1
          fi
          if [ -z "${{ secrets.NOTION_DATABASE_ID }}" ]; then
            echo "::error::Secrets に NOTION_DATABASE_ID がありません（空です）。"
            exit 1
          fi
          echo "Secrets の名前は OK（値は表示しません）。"

      - name: Install dependencies
        run: npm ci

      - name: Fetch Notion and write Markdown
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
        run: node scripts/notion-sync.mjs

      - name: Commit and push if changed
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add context/notion-tasks.generated.md
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: sync Notion tasks"
            git push
          fi
