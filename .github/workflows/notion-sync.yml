# Notion のデータベースを取得し、context/notion-tasks.generated.md を更新してコミットする
name: Notion sync

on:
  workflow_dispatch: # 手動実行（GitHub の Actions タブから）
  schedule:
    # 30分ごと（UTC）。日本時間に合わせて変えてよい
    - cron: "*/30 * * * *"

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Fetch Notion and write Markdown
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
        run: node scripts/notion-sync.mjs

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add context/notion-tasks.generated.md
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: sync Notion tasks"
            git push
          fi
